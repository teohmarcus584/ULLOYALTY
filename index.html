<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Customer Rewards Portal | Smart Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: linear-gradient(145deg, #f0f5fb 0%, #e9f0f8 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1.5rem; }
        .portal-card { max-width: 620px; width: 100%; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(2px); border-radius: 2.5rem; box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05); overflow: hidden; }
        .brand-header { background: #1e2f3e; padding: 1.8rem 2rem; color: white; text-align: center; }
        .brand-header h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 0.3rem; }
        .brand-header p { opacity: 0.8; font-size: 0.9rem; }
        .content-pane { padding: 2rem 2rem 2rem 2rem; }
        .form-group { margin-bottom: 1.3rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.45rem; color: #1e2f3e; }
        input { width: 100%; padding: 0.9rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 1.2rem; font-size: 1rem; background: white; transition: 0.2s; outline: none; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        button { background: #1e2f3e; color: white; border: none; padding: 0.85rem 1.2rem; border-radius: 2rem; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 0.5rem; }
        button:hover { background: #0f1e2a; transform: translateY(-1px); }
        .secondary-btn { background: #eef2ff; color: #1e2f3e; border: 1px solid #cbd5e1; }
        .secondary-btn:hover { background: #e2e8f0; transform: none; }
        .danger-btn { background: #fff1f0; color: #b91c1c; border: 1px solid #fecaca; }
        .danger-btn:hover { background: #fee2e2; }
        .alert { background: #fef9e3; border-left: 5px solid #f59e0b; padding: 0.9rem; border-radius: 1rem; margin-bottom: 1.2rem; font-size: 0.85rem; color: #92400e; }
        .error-box { background: #fee2e2; border-left-color: #dc2626; color: #991b1b; }
        .success-box { background: #e0f2fe; border-left-color: #0ea5e9; color: #075985; }
        .dashboard-section { background: #f8fafc; border-radius: 1.5rem; padding: 1.3rem; margin-bottom: 1.6rem; border: 1px solid #e9edf2; }
        .points-badge { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); display: inline-block; padding: 0.45rem 1.2rem; border-radius: 2rem; font-weight: 700; font-size: 1.3rem; color: #2c2c2c; }
        .points-label { font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #475569; }
        .prize-item { background: white; border-radius: 1.2rem; padding: 1rem; margin-bottom: 0.8rem; border: 1px solid #eef2ff; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .prize-info { flex: 2; }
        .prize-name { font-weight: 700; font-size: 1.1rem; color: #0f172a; }
        .prize-meta { font-size: 0.9rem; font-weight: 500; color: #1e2f3e; margin-top: 0.3rem; }
        .history-list { max-height: 380px; overflow-y: auto; margin-top: 0.8rem; }
        .purchase-item { background: white; border-radius: 1.2rem; padding: 0.9rem; margin-bottom: 0.8rem; border: 1px solid #eef2ff; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .product-info { flex: 2; }
        .product-name { font-weight: 700; color: #0f172a; }
        .product-meta { font-size: 0.7rem; color: #64748b; margin-top: 0.2rem; }
        .product-total { font-weight: 700; color: #0f172a; background: #f1f5f9; padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.85rem; }
        hr { margin: 1rem 0; border: none; border-top: 1px solid #e2e8f0; }
        .flex-btns { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .flex-btns button { margin-top: 0; width: auto; flex: 1; }
        .hidden { display: none; }
        .text-center { text-align: center; }
        .welcome-msg { font-size: 1.1rem; font-weight: 600; color: #1e2f3e; margin-bottom: 1rem; }
        footer { background: #f1f5f9; padding: 1rem; text-align: center; font-size: 0.7rem; color: #5b6e8c; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-container { background:white; border-radius:2rem; max-width:90%; width:380px; padding:1.8rem; box-shadow:0 20px 35px rgba(0,0,0,0.2); }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: white; font-weight: 600; background: rgba(0,0,0,0.5); padding: 0.4rem 1.2rem; border-radius: 2rem; font-size: 0.9rem; }
        .section-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }
        .toggle-history-btn {
            background: #eef2ff;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            width: auto;
            border-radius: 2rem;
            margin-top: 0;
            font-weight: 500;
        }
        .toggle-history-btn:hover { background: #e2e8f0; transform: none; }
        .sync-status {
            font-size: 0.7rem;
            background: #eef2ff;
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            color: #1e2f3e;
            margin-left: 0.5rem;
        }
        .sync-status.syncing { background: #fef9c3; color: #854d0e; }
        .sync-status.error { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
<div class="portal-card" id="app">
    <div class="brand-header">
        <h1>✨ Rewards Club</h1>
        <p>Earn points | Track purchases | View lucky draw prizes</p>
    </div>
    <div class="content-pane" id="dynamicContent">
        <div id="loadingView" class="text-center" style="padding: 2rem;">
            <span>Loading secure portal...</span>
        </div>
    </div>
    <footer>
        🎁 1 point for every RM 1 spent | Ask in-store for details and more promotions
    </footer>
</div>

<script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbx27b_Z11UiMA0E0YpfQHnmDr7iZWAxyqOcH9Qoyl-f38nLnocfEhipQYtwPLhuSOjUsg/exec";

    // ========== SMART CACHE HELPERS ==========
    const CACHE_KEYS = {
        DASHBOARD_PREFIX: 'cust_dash_',
        HASH_PREFIX: 'cust_hash_'
    };
    let backgroundSyncInterval = null;
    let currentCustomerId = null;

    function computeHash(data) {
        const str = JSON.stringify(data);
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0;
        }
        return hash.toString();
    }

    function getDashboardCache(customerId) {
        const key = CACHE_KEYS.DASHBOARD_PREFIX + customerId;
        const cached = localStorage.getItem(key);
        if (!cached) return null;
        try {
            const { data, timestamp, hash } = JSON.parse(cached);
            // Cache valid for 5 minutes (300000 ms) – but we'll still check remote hash
            return { data, timestamp, hash };
        } catch(e) { return null; }
    }

    function saveDashboardCache(customerId, purchases, prizes, points, name) {
        const cacheData = { purchases, prizes, points, name };
        const hash = computeHash(cacheData);
        const key = CACHE_KEYS.DASHBOARD_PREFIX + customerId;
        const hashKey = CACHE_KEYS.HASH_PREFIX + customerId;
        localStorage.setItem(key, JSON.stringify({
            data: cacheData,
            timestamp: Date.now(),
            hash: hash
        }));
        localStorage.setItem(hashKey, hash);
    }

    function getStoredHash(customerId) {
        return localStorage.getItem(CACHE_KEYS.HASH_PREFIX + customerId);
    }

    async function fetchRemoteHash(customerId) {
        // Call a lightweight endpoint that returns a hash of the customer's data (purchases + prizes + points)
        // If your backend doesn't have such endpoint, we'll simulate by fetching full data but only compare hash.
        // For efficiency, we'll rely on the fact that getCustomerPurchases + getCustomerLuckyDraws are relatively light.
        // But to truly minimize bandwidth, we'd need a dedicated hash endpoint.
        // As a workaround, we'll fetch only the points via customerStatus (light) and compare with cached points? Not ideal.
        // Simpler: we'll fetch full data in background but only update UI if hash changed.
        // That's still acceptable because dashboard is not huge.
        // However, to implement true hash check, I'll assume backend supports ?action=getCustomerDashboardHash.
        // If not, we fallback to full fetch but still use cache to show instantly.
        try {
            const url = `${API_BASE}?action=getCustomerDashboardHash&customer_id=${customerId}`;
            const res = await fetch(url);
            const json = await res.json();
            if (json.success && json.hash) return json.hash;
        } catch(e) { console.warn("Hash endpoint not available, will fallback to full sync"); }
        return null;
    }

    async function backgroundSyncCustomer(customer) {
        if (!customer || !customer.id) return;
        const customerId = customer.id;
        const currentHash = getStoredHash(customerId);
        let remoteHash = null;
        try {
            remoteHash = await fetchRemoteHash(customerId);
            if (remoteHash && remoteHash === currentHash) {
                // No changes, just update timestamp
                const key = CACHE_KEYS.DASHBOARD_PREFIX + customerId;
                const cached = localStorage.getItem(key);
                if (cached) {
                    const { data } = JSON.parse(cached);
                    localStorage.setItem(key, JSON.stringify({
                        data: data,
                        timestamp: Date.now(),
                        hash: currentHash
                    }));
                }
                updateSyncStatusUI(true);
                return;
            }
        } catch(e) { /* fallback to full sync */ }

        // Full sync (either no hash endpoint or hash mismatch)
        await refreshCustomerDataFull(customer, true);
        updateSyncStatusUI(true);
    }

    async function refreshCustomerDataFull(customer, silent = false) {
        if (!customer) return;
        const idSnapshot = customer.id;
        const phoneSnapshot = customer.phone;
        if (!silent) showLoadingOverlay("Refreshing your data...");
        try {
            const [purchasesRes, luckyRes, statusRes] = await Promise.all([
                callApi('getCustomerPurchases', 'GET', { customer_id: idSnapshot }),
                callApi('getCustomerLuckyDraws', 'GET', { customer_id: idSnapshot }),
                callApi('customerStatus', 'GET', { phone: phoneSnapshot })
            ]);
            if (!statusRes.success) throw new Error("Failed to get points");
            const points = statusRes.customer?.points || 0;
            const name = statusRes.customer?.name || customer.name || 'Guest';
            const purchases = purchasesRes.success ? (purchasesRes.purchases || []) : [];
            const prizes = luckyRes.success ? (luckyRes.prizes || []) : [];
            // Update currentCustomer points/name
            customer.points = points;
            customer.name = name;
            // Save to cache
            saveDashboardCache(idSnapshot, purchases, prizes, points, name);
            // Update UI only if this customer is still current
            if (currentCustomer && currentCustomer.id === idSnapshot) {
                renderDashboard(customer, purchases, prizes);
                if (!silent) showMessage('dashboardMsg', '✅ Data refreshed', true);
            }
        } catch(err) {
            console.error("Full sync failed", err);
            if (!silent) showMessage('dashboardMsg', 'Failed to refresh. Check network.', false);
        } finally {
            if (!silent) hideLoadingOverlay();
        }
    }

    function updateSyncStatusUI(success) {
        const statusSpan = document.getElementById('syncStatusIndicator');
        if (statusSpan) {
            if (success) {
                statusSpan.innerHTML = '🔄 Synced';
                statusSpan.className = 'sync-status';
            } else {
                statusSpan.innerHTML = '⚠️ Sync error';
                statusSpan.className = 'sync-status error';
            }
        }
    }

    function startBackgroundSync(customer) {
        if (backgroundSyncInterval) clearInterval(backgroundSyncInterval);
        if (!customer) return;
        backgroundSyncInterval = setInterval(() => {
            if (currentCustomer && currentCustomer.id === customer.id) {
                backgroundSyncCustomer(customer);
            } else {
                clearInterval(backgroundSyncInterval);
                backgroundSyncInterval = null;
            }
        }, 60000); // every 60 seconds
    }

    function stopBackgroundSync() {
        if (backgroundSyncInterval) {
            clearInterval(backgroundSyncInterval);
            backgroundSyncInterval = null;
        }
    }

    // ========== EXISTING API & UI CODE (adapted) ==========
    async function callApi(action, method = 'GET', params = {}) {
        let url = `${API_BASE}?action=${action}`;
        const options = { method: method, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } };
        let bodyParams = new URLSearchParams();
        bodyParams.append('action', action);
        if (method === 'GET') {
            for (let [key, val] of Object.entries(params)) if (val !== undefined && val !== null) url += `&${encodeURIComponent(key)}=${encodeURIComponent(val)}`;
        } else {
            for (let [key, val] of Object.entries(params)) if (val !== undefined && val !== null) bodyParams.append(key, val);
            options.body = bodyParams.toString();
        }
        try {
            const response = await fetch(method === 'GET' ? url : API_BASE, options);
            return await response.json();
        } catch (err) {
            console.error("API call failed", err);
            return { success: false, error: "Network error, please try again." };
        }
    }

    let currentCustomer = null;
    let loginPhone = "";
    const appContainer = document.getElementById('dynamicContent');

    let activeLoadingOverlay = null;
    function showLoadingOverlay(message = "Refreshing your data...") {
        if (activeLoadingOverlay) hideLoadingOverlay();
        const overlayDiv = document.createElement('div');
        overlayDiv.className = 'loading-overlay';
        overlayDiv.id = 'globalLoadingOverlay';
        overlayDiv.innerHTML = `
            <div class="loading-spinner"></div>
            <div class="loading-text">${escapeHtml(message)}</div>
        `;
        document.body.appendChild(overlayDiv);
        activeLoadingOverlay = overlayDiv;
    }
    function hideLoadingOverlay() {
        if (activeLoadingOverlay) {
            activeLoadingOverlay.remove();
            activeLoadingOverlay = null;
        }
    }

    function renderPhoneEntry() {
        appContainer.innerHTML = `
            <div>
                <div class="alert" style="background:#eef2ff;">🔐 <strong>Loyalty login</strong><br>Enter your registered phone number to access points, purchase history & lucky draw prizes.</div>
                <div class="form-group"><label>📱 Phone Number</label><input type="tel" id="phoneInput" placeholder="e.g., 60123456789" value="${loginPhone}" autocomplete="off"></div>
                <button id="checkPhoneBtn">Continue →</button>
                <div id="phoneMessage" class="alert hidden"></div>
                <div class="text-center" style="margin-top:1rem; font-size:0.75rem; color:#5b6e8c;">Not registered? Ask store staff to add your phone during checkout.</div>
            </div>
        `;
        document.getElementById('checkPhoneBtn').addEventListener('click', checkCustomerStatus);
        document.getElementById('phoneInput').focus();
    }

    function renderPasswordLogin(customerInfo) {
        appContainer.innerHTML = `
            <div>
                <div class="success-box alert">👋 Welcome back, ${escapeHtml(customerInfo.name || 'Valued Customer')}!</div>
                <div class="form-group"><label>🔑 Enter your password</label><input type="password" id="loginPassword" placeholder="••••••" autocomplete="off"></div>
                <button id="loginPasswordBtn">Login to Dashboard →</button>
                <div id="pwdMessage" class="alert hidden"></div>
                <hr><div class="text-center"><a id="forgotOrSetupLink" style="color:#3b82f6; cursor:pointer; font-size:0.8rem;">Forgot password? Contact store support</a></div>
            </div>
        `;
        document.getElementById('loginPasswordBtn').addEventListener('click', () => performLogin(customerInfo));
        document.getElementById('forgotOrSetupLink').addEventListener('click', () => showMessage('pwdMessage', "Please ask store manager to reset your password.", false));
    }

    function renderSetPassword(customerInfo) {
        appContainer.innerHTML = `
            <div>
                <div class="success-box alert">🎉 Welcome ${escapeHtml(customerInfo.name || 'Customer')}! You have ${customerInfo.points || 0} points waiting.</div>
                <div class="alert" style="background:#fef9c3;">✨ First-time setup: Create a password to access your dashboard.</div>
                <div class="form-group"><label>Create password</label><input type="password" id="newPwd" placeholder="Min 4 characters" autocomplete="new-password"></div>
                <div class="form-group"><label>Confirm password</label><input type="password" id="confirmPwd" placeholder="Re-enter password"></div>
                <button id="setPwdBtn">Set Password & Enter →</button>
                <div id="setPwdMessage" class="alert hidden"></div>
            </div>
        `;
        document.getElementById('setPwdBtn').addEventListener('click', () => registerNewPassword(customerInfo));
    }

    async function renderDashboard(customer, purchases = [], prizes = []) {
        const points = customer.points || 0;
        const name = customer.name || 'Guest';
        const purchaseHtml = purchases.length === 0 ? 
            `<div class="text-center" style="padding:1rem; color:#64748b;">✨ No purchases found yet. Start shopping to see history!</div>` :
            purchases.map(p => `
                <div class="purchase-item">
                    <div class="product-info"><div class="product-name">${escapeHtml(p.product_name || 'Product')}</div><div class="product-meta">📅 ${escapeHtml(p.purchase_date || p.timestamp || '—')} &nbsp;| &nbsp;Qty: ${p.quantity || 0}</div></div>
                    <div class="product-total">💰 ${(p.total || 0).toFixed(2)}</div>
                </div>
            `).join('');
        const prizesHtml = prizes.length === 0 ?
            `<div class="text-center" style="padding:1rem; color:#64748b;">🎁 No active lucky draw prizes. Spin the wheel in-store!</div>` :
            prizes.map(p => `
                <div class="prize-item">
                    <div class="prize-info">
                        <div class="prize-name">🎉 ${escapeHtml(p.prize)}</div>
                        <div class="prize-meta">Receipt: ${escapeHtml(p.receipt)} | Expires: ${p.expiryDate || '30 days from win'}</div>
                    </div>
                </div>
            `).join('');

        appContainer.innerHTML = `
            <div>
                <div class="dashboard-section" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <div>
                        <div class="welcome-msg">🌟 Hello, ${escapeHtml(name)} <span id="syncStatusIndicator" class="sync-status">🔄 Synced</span></div>
                        <div class="points-label">YOUR REWARD POINTS</div>
                        <div class="points-badge">${points} pts</div>
                    </div>
                    <button id="changePwdDashboardBtn" class="secondary-btn" style="width:auto; padding:0.5rem 1rem;">🔐 Change Password</button>
                </div>

                <div class="dashboard-section">
                    <div style="font-weight:700; margin-bottom:0.5rem;">🎁 Your Active Lucky Draw Prizes</div>
                    <div id="prizesList">${prizesHtml}</div>
                </div>

                <div class="dashboard-section">
                    <div class="section-header-flex">
                        <div style="font-weight:700;">🛍️ Your Purchase History</div>
                        <button id="toggleHistoryBtn" class="toggle-history-btn">📋 Show Purchase History</button>
                    </div>
                    <div id="purchaseHistoryContainer" class="history-list" style="display: none;">
                        ${purchaseHtml}
                    </div>
                </div>

                <div class="flex-btns">
                    <button id="refreshHistoryBtn" class="secondary-btn">⟳ Refresh All</button>
                    <button id="logoutBtn" class="danger-btn">🚪 Sign Out</button>
                </div>
                <div id="dashboardMsg" class="alert hidden"></div>
            </div>
        `;

        document.getElementById('changePwdDashboardBtn').addEventListener('click', showChangePasswordModal);
        document.getElementById('refreshHistoryBtn').addEventListener('click', () => {
            showLoadingOverlay("Refreshing purchases, points & prizes...");
            refreshCustomerDataFull(currentCustomer, false).finally(() => hideLoadingOverlay());
        });
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        const toggleBtn = document.getElementById('toggleHistoryBtn');
        const historyContainer = document.getElementById('purchaseHistoryContainer');
        let historyVisible = false;
        toggleBtn.addEventListener('click', () => {
            if (historyVisible) {
                historyContainer.style.display = 'none';
                toggleBtn.innerHTML = '📋 Show Purchase History';
                historyVisible = false;
            } else {
                historyContainer.style.display = 'block';
                toggleBtn.innerHTML = '🙈 Hide Purchase History';
                historyVisible = true;
            }
        });
    }

    // Load dashboard with cache-first strategy
    async function loadDashboardWithCache(customer) {
        if (!customer) return;
        const cached = getDashboardCache(customer.id);
        if (cached) {
            // Render from cache immediately
            const { purchases, prizes, points, name } = cached.data;
            customer.points = points;
            customer.name = name;
            renderDashboard(customer, purchases, prizes);
            // Then background sync
            backgroundSyncCustomer(customer);
        } else {
            // No cache, full fetch with loading
            showLoadingOverlay("Loading your dashboard...");
            await refreshCustomerDataFull(customer, false);
            hideLoadingOverlay();
        }
        startBackgroundSync(customer);
    }

    async function checkCustomerStatus() {
        const phone = document.getElementById('phoneInput').value.trim();
        if (!phone) { showMessage('phoneMessage', 'Please enter phone number.', false); return; }
        if (!/^[\d+\-\s]{6,15}$/.test(phone) && phone.length < 5) { showMessage('phoneMessage', 'Enter a valid phone number.', false); return; }
        loginPhone = phone;
        showMessage('phoneMessage', 'Checking...', true);
        try {
            const res = await callApi('customerStatus', 'GET', { phone });
            if (!res.success) { showMessage('phoneMessage', res.error || 'Customer not registered. Please register at store.', false); return; }
            if (res.hasPassword) renderPasswordLogin(res.customer);
            else renderSetPassword(res.customer);
        } catch(e) { showMessage('phoneMessage', 'Service error. Please try again later.', false); }
    }

    async function performLogin(customerInfo) {
        const password = document.getElementById('loginPassword').value;
        if (!password) { showMessage('pwdMessage', 'Password required.', false); return; }
        const res = await callApi('customerLogin', 'POST', { phone: customerInfo.phone, password });
        if (res.success && res.customer) {
            currentCustomer = res.customer;
            currentCustomerId = res.customer.id;
            await loadDashboardWithCache(currentCustomer);
        } else showMessage('pwdMessage', res.error || 'Invalid password.', false);
    }

    async function registerNewPassword(customerInfo) {
        const newPwd = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;
        if (newPwd.length < 4) { showMessage('setPwdMessage', 'Password must be at least 4 characters.', false); return; }
        if (newPwd !== confirmPwd) { showMessage('setPwdMessage', 'Passwords do not match.', false); return; }
        const res = await callApi('customerSetPassword', 'POST', { phone: customerInfo.phone, password: newPwd });
        if (res.success) {
            currentCustomer = res.customer;
            currentCustomerId = res.customer.id;
            await loadDashboardWithCache(currentCustomer);
        } else showMessage('setPwdMessage', res.error || 'Failed to set password.', false);
    }

    function showChangePasswordModal() {
        if (!currentCustomer) return;
        const modalHtml = `
            <div id="changePwdOverlay" class="modal-overlay">
                <div class="modal-container">
                    <h3 style="margin-bottom:1rem;">Change Password</h3>
                    <div class="form-group"><label>Current Password</label><input type="password" id="oldPwdModal" placeholder="••••••"></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="newPwdModal" placeholder="Min 4 characters"></div>
                    <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPwdModal" placeholder="Re-enter"></div>
                    <div style="display:flex; gap:10px; margin-top:0.5rem;"><button id="modalConfirmBtn" style="background:#1e2f3e;">Update</button><button id="modalCancelBtn" class="secondary-btn">Cancel</button></div>
                    <div id="modalMsg" style="font-size:0.8rem; margin-top:0.8rem; color:#b91c1c;"></div>
                </div>
            </div>
        `;
        appContainer.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
            const oldPwd = document.getElementById('oldPwdModal').value;
            const newPwd = document.getElementById('newPwdModal').value;
            const confirmPwd = document.getElementById('confirmPwdModal').value;
            if (!oldPwd || !newPwd) { document.getElementById('modalMsg').innerText = 'Please fill all fields.'; return; }
            if (newPwd !== confirmPwd) { document.getElementById('modalMsg').innerText = 'New passwords do not match.'; return; }
            if (newPwd.length < 4) { document.getElementById('modalMsg').innerText = 'Password must be at least 4 characters.'; return; }
            const result = await callApi('customerChangePassword', 'POST', { phone: currentCustomer.phone, old_password: oldPwd, new_password: newPwd });
            if (result.success) {
                document.getElementById('modalMsg').style.color = '#15803d';
                document.getElementById('modalMsg').innerText = '✅ Password updated!';
                setTimeout(() => { document.getElementById('changePwdOverlay')?.remove(); showMessage('dashboardMsg', 'Password changed successfully', true); }, 1200);
            } else {
                document.getElementById('modalMsg').innerText = result.error || 'Update failed.';
            }
        });
        document.getElementById('modalCancelBtn').addEventListener('click', () => document.getElementById('changePwdOverlay')?.remove());
    }

    function showMessage(elementId, text, isSuccess = false) {
        const el = document.getElementById(elementId);
        if (el) {
            el.innerText = text;
            el.classList.remove('hidden', 'error-box', 'success-box');
            el.classList.add(isSuccess ? 'success-box' : 'error-box');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }
    }

    function logout() {
        stopBackgroundSync();
        currentCustomer = null;
        currentCustomerId = null;
        loginPhone = "";
        hideLoadingOverlay();
        renderPhoneEntry();
    }
    
    function escapeHtml(str) { 
        if (!str) return ''; 
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); 
    }

    renderPhoneEntry();
</script>
</body>
</html>
